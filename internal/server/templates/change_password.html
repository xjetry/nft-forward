{{template "header" (mkmap "Title" "修改密码" "Nav" "" "Crumb" "修改密码" "User" .User "Flash" .Flash)}}

<div class="card" style="max-width:560px">
  <div class="card-head"><h3>修改密码</h3></div>
  <div class="card-body">
    <form method="post" action="/change-password">
    <div class="form-grid">
      <label class="fl">原密码</label>
      <input class="inp" name="old_password" type="password" required autofocus>
      <label class="fl">新密码</label>
      <input class="inp" name="new_password" type="password" minlength="6" required>
      <label class="fl">再次输入</label>
      <input class="inp" name="confirm" type="password" minlength="6" required>
    </div>
    <div class="form-foot">
      <button class="btn btn-primary" type="submit">更新密码</button>
      <span class="hint">提交后其他设备/浏览器上的旧会话会被注销，仅当前页保留。</span>
    </div>
    </form>
  </div>
</div>

{{template "footer" (mkmap "User" .User)}}
