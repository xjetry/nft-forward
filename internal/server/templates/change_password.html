{{template "header" (mkmap "Title" "修改密码" "User" .User "Flash" .Flash)}}
<h1>修改密码</h1>
<div class="card" style="max-width:520px">
<form method="post" action="/change-password">
<div class="grid">
<label>原密码</label><input name="old_password" type="password" required autofocus>
<label>新密码</label><input name="new_password" type="password" minlength="6" required>
<label>再次输入</label><input name="confirm" type="password" minlength="6" required>
</div>
<div style="margin-top:12px"><button type="submit">更新密码</button></div>
<p style="color:#86868b;font-size:13px;margin-top:8px">提交后其他设备/浏览器上的旧会话会被注销，仅当前页保留。</p>
</form>
</div>
{{template "footer" .}}
